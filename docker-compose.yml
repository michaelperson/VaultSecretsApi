# =============================================================================
#  HashiCorp Vault (mode DEV) + bootstrap pour le workshop « Vault & secrets ».
#  ⚠ Mode dev : Vault démarre DÉSCELLÉ, en mémoire (données volatiles).
#     Parfait pour la démo — JAMAIS pour la production.
#
#  Démarrage :  docker compose up -d
#  Vault UI  :  http://localhost:8200  (token : root-dev-token)
# =============================================================================
services:
  vault:
    image: hashicorp/vault:latest        # pinner une version précise en prod
    container_name: vault-dev
    cap_add:
      - IPC_LOCK                          # mlock : empeche les secrets d'aller dans le swap
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-dev-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # IMPORTANT : le client vault (CLI) parle en HTTPS par defaut.
      # En mode dev, Vault ecoute en HTTP -> on force l'adresse du CLI,
      # sinon le healthcheck "vault status" echoue (conteneur "unhealthy").
      VAULT_ADDR: "http://127.0.0.1:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  # Conteneur ephemere : ecrit le secret + configure policy & AppRole, puis s'arrete.
  bootstrap:
    image: hashicorp/vault:latest
    container_name: vault-bootstrap
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-dev-token"
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap.sh"]
    volumes:
      - ./bootstrap:/bootstrap:ro
